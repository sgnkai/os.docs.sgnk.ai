<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
[data-theme="dark"]{
--bg:#0a0a0f;--bg-card:#12121a;--bg-sidebar:#0e0e16;--bg-hover:rgba(255,255,255,.04);--bg-input:rgba(255,255,255,.04);

--accent:#7c6aff;--accent-glow:rgba(124,106,255,.12);--accent-soft:rgba(124,106,255,.08);

[data-theme="light"]{
--bg:#f5f5f7;--bg-card:#ffffff;--bg-sidebar:#fafafc;--bg-hover:rgba(0,0,0,.03);--bg-input:rgba(0,0,0,.04);
--text:#1a1a2e;--text-dim:#4a4a5e;--text-muted:#8a8a9e;
--accent:#6c5ce7;--accent-glow:rgba(108,92,231,.08);--accent-soft:rgba(108,92,231,.06);
--green:#059669;--amber:#d97706;--red:#dc2626;--cyan:#0891b2;
--border:rgba(0,0,0,.08);--border-active:rgba(108,92,231,.25);
--code-bg:rgba(108,92,231,.07);--code-text:#5b4cad;--pre-bg:#f0eff5;
--tag-hidden-bg:rgba(100,100,120,.1);
--hero-grad-a:rgba(108,92,231,.06);--hero-grad-b:rgba(167,139,250,.03);

--scrollbar-thumb:rgba(0,0,0,.12);--scrollbar-track:transparent;

}
:root{--radius:10px;--mono:'JetBrains Mono',monospace;--sans:'Plus Jakarta Sans',sans-serif}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.7;overflow:hidden;height:100vh;transition:background .3s,color .3s}
a{color:var(--accent);text-decoration:none;transition:color .2s}

pre{font-family:var(--mono);background:var(--pre-bg);border:1px solid var(--border);border-radius:8px;padding:16px 20px;overflow-x:auto;font-size:.82em;line-height:1.65;color:var(--code-text);margin:16px 0}
table{width:100%;border-collapse:collapse;margin:16px 0;font-size:.9em}
th{background:var(--accent-soft);text-align:left;padding:10px 14px;font-weight:600;color:var(--accent);border-bottom:2px solid var(--border-active);white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text-dim);vertical-align:top}
tr:hover td{background:var(--bg-hover)}
h1{font-size:2.1em;font-weight:800;letter-spacing:-.03em;line-height:1.25;color:var(--text)}
h2{font-size:1.45em;font-weight:700;letter-spacing:-.02em;color:var(--text);margin:36px 0 14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
h3{font-size:1.12em;font-weight:600;color:var(--text);margin:24px 0 8px}
h4{font-size:1em;font-weight:600;color:var(--text-dim);margin:18px 0 6px}
p{margin:8px 0;color:var(--text-dim)}
ul,ol{margin:8px 0 8px 24px;color:var(--text-dim)}
li{margin:4px 0}
li::marker{color:var(--accent)}
strong{color:var(--text);font-weight:600}
hr{border:none;border-top:1px solid var(--border);margin:32px 0}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:272px;min-width:272px;background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;z-index:100;transition:transform .3s cubic-bezier(.4,0,.2,1),background .3s}
.sidebar-header{padding:20px 18px 14px;border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),#a78bfa);border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:.8em;flex-shrink:0}
.logo-text{font-size:1.05em;font-weight:700;letter-spacing:-.02em;color:var(--text)}
.logo-sub{font-size:.68em;color:var(--text-muted);font-weight:500;margin-top:1px;letter-spacing:.04em;text-transform:uppercase}
.sidebar-search{padding:10px 14px}
.sidebar-search input{width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:var(--sans);font-size:.84em;outline:none;transition:border-color .2s,box-shadow .2s}
.sidebar-search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.sidebar-search input::placeholder{color:var(--text-muted)}
.sidebar-nav{flex:1;overflow-y:auto;padding:4px 0 24px;scrollbar-width:thin;scrollbar-color:var(--scrollbar-thumb) var(--scrollbar-track)}
.nav-group{margin:2px 0}
.nav-group-label{padding:10px 18px 4px;font-size:.68em;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted)}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 18px;font-size:.87em;color:var(--text-dim);cursor:pointer;transition:all .15s;border-left:2.5px solid transparent;user-select:none}
.nav-item:hover{background:var(--bg-hover);color:var(--text)}
.nav-item.active{background:var(--accent-glow);color:var(--accent);border-left-color:var(--accent);font-weight:600}
.nav-item .icon{font-size:1em;width:22px;text-align:center;flex-shrink:0}
.nav-item .label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-footer{padding:12px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:.78em;color:var(--text-muted)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{padding:12px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;background:var(--topbar-bg);flex-shrink:0;transition:background .3s}
.breadcrumb{display:flex;align-items:center;gap:8px;font-size:.85em;color:var(--text-muted);min-width:0}
.bc-sep{opacity:.5}

.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0}
.version-tag{font-size:.72em;padding:4px 10px;border-radius:99px;background:var(--accent-soft);color:var(--accent);font-weight:600;font-family:var(--mono);white-space:nowrap}
.theme-toggle{width:38px;height:22px;border-radius:99px;border:1.5px solid var(--border);background:var(--bg-input);cursor:pointer;position:relative;transition:all .3s;flex-shrink:0}
.theme-toggle:hover{border-color:var(--accent)}
.theme-toggle .knob{width:16px;height:16px;border-radius:50%;background:var(--accent);position:absolute;top:1.5px;left:2px;transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;justify-content:center;font-size:9px;line-height:1}

.content-area{flex:1;overflow-y:auto;scroll-behavior:smooth;scrollbar-width:thin;scrollbar-color:var(--scrollbar-thumb) var(--scrollbar-track)}

.callout{background:var(--accent-soft);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:14px 18px;margin:16px 0;font-size:.92em;color:var(--text-dim)}

.table-wrap{overflow-x:auto;margin:16px 0;border:1px solid var(--border);border-radius:var(--radius);-webkit-overflow-scrolling:touch}
.table-wrap table{margin:0;min-width:480px}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.75em;font-weight:600;margin:1px 2px}

.tag-beta{background:rgba(251,191,36,.12);color:var(--amber)}

.tag-internal{background:rgba(248,113,113,.12);color:var(--red)}
.tag-disabled{background:var(--bg-hover);color:var(--text-muted)}
.flow-box{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin:16px 0;box-shadow:var(--shadow)}
.flow-steps{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.flow-step{background:var(--accent-soft);border:1px solid var(--border-active);border-radius:8px;padding:8px 14px;font-size:.82em;font-weight:500;color:var(--text)}
.flow-arrow{color:var(--text-muted);font-size:1.1em;flex-shrink:0}
.section-links{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin:20px 0}
.section-link{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)}
.section-link:hover{border-color:var(--border-active);background:var(--accent-glow);transform:translateY(-1px)}
.section-link .sl-icon{font-size:1.2em;flex-shrink:0}
.section-link .sl-label{font-size:.88em;font-weight:600;color:var(--text)}
.section-link .sl-desc{font-size:.74em;color:var(--text-muted);margin-top:2px}
.menu-toggle{display:none;background:none;border:1px solid var(--border);color:var(--text);font-size:1.1em;cursor:pointer;padding:5px 8px;border-radius:6px;transition:background .15s;flex-shrink:0;line-height:1}
.menu-toggle:active{background:var(--bg-hover)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:99;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}
@media(max-width:900px){
.sidebar{width:260px;min-width:260px;position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);box-shadow:4px 0 24px rgba(0,0,0,.3)}

.page-content{padding:24px 20px 60px}
.topbar{padding:10px 16px}
.hero-card{padding:22px 20px}
.hero-card h1{font-size:1.6em}
.stat-grid{grid-template-columns:repeat(2,1fr);gap:8px}
.stat-card{padding:12px 14px}
.stat-card .val{font-size:1.4em}
.flow-steps{gap:6px}
.flow-step{padding:6px 10px;font-size:.78em}
.section-links{grid-template-columns:1fr}
.table-wrap table{font-size:.82em}
th,td{padding:8px 10px}
h1{font-size:1.7em}
h2{font-size:1.25em}
.version-tag{display:none}
}
@media(max-width:480px){
.page-content{padding:16px 14px 60px}
.topbar{padding:8px 12px;gap:10px}
.hero-card{padding:18px 16px;border-radius:12px}

.stat-grid{grid-template-columns:1fr 1fr;gap:6px}
.stat-card{padding:10px 12px}
.stat-card .val{font-size:1.2em}
h1{font-size:1.45em}
h2{font-size:1.15em;margin:28px 0 10px}
.callout{padding:10px 14px;font-size:.87em}
.flow-box{padding:12px}
pre{padding:12px 14px;font-size:.76em}
.breadcrumb{font-size:.78em}
.theme-toggle{width:34px;height:20px}
.theme-toggle .knob{width:14px;height:14px}
[data-theme="light"] .theme-toggle .knob{transform:translateX(13px)}
}
</style>

<script>
// Pages data - loaded as JSON object, NO template literals
var PAGES = {"overview": "<div class=\"hero-card\"><h1>sgnk CareerOS</h1><p style=\"font-size:1.08em;color:var(--text);margin-top:8px\">Complete Feature, Admin, Credits, and System Reference</p><div class=\"meta\"><div class=\"meta-item\">📍 <span>os.sgnk.ai</span></div><div class=\"meta-item\">📂 <span>sgnkos</span></div><div class=\"meta-item\">📅 <span>2026-03-27</span></div></div></div><h2>What This File Covers</h2><p>This document is the exhaustive product and operational source of truth for the current CareerOS codebase.</p><ul><li>The user-facing product and app shell</li><li>Every routed module and screen</li><li>The feature registry and launch-state model</li><li>The owner/internal controls panel</li><li>Feature management and credit management workflows</li><li>Notifications and activity logging</li><li>The storage model and edge-function surface</li><li>Major shared components that make the platform work</li></ul><div class=\"callout\">This is not a pitch deck. It is the closest thing to a <strong>product operations manual</strong> for the current CareerOS codebase.</div><p>The goal: CareerOS is a persistent career workspace that lets one user carry one resume system through upload, parsing, storage, editing, analysis, tailoring, export, applications, outreach, interview prep, portfolio work, and longer-term career growth surfaces — all inside the same authenticated shell.</p><h2>Quick Navigation</h2><div class=\"section-links\"><div class=\"section-link\" onclick=\"navigateTo('snapshot')\"><div class=\"sl-icon\">📊</div><div><div class=\"sl-label\">System Snapshot</div><div class=\"sl-desc\">Counts, surfaces, feature states</div></div></div><div class=\"section-link\" onclick=\"navigateTo('architecture')\"><div class=\"sl-icon\">🏗</div><div><div class=\"sl-label\">Architecture</div><div class=\"sl-desc\">Frontend + backend stack</div></div></div><div class=\"section-link\" onclick=\"navigateTo('feature-gov')\"><div class=\"sl-icon\">🎛</div><div><div class=\"sl-label\">Feature Governance</div><div class=\"sl-desc\">Registry, states, access model</div></div></div><div class=\"section-link\" onclick=\"navigateTo('credits')\"><div class=\"sl-icon\">💳</div><div><div class=\"sl-label\">Credits &amp; Billing</div><div class=\"sl-desc\">AI cost governance</div></div></div><div class=\"section-link\" onclick=\"navigateTo('admin')\"><div class=\"sl-icon\">⚙️</div><div><div class=\"sl-label\">Admin Panel</div><div class=\"sl-desc\">Operational governance</div></div></div><div class=\"section-link\" onclick=\"navigateTo('screen-map')\"><div class=\"sl-icon\">📱</div><div><div class=\"sl-label\">Feature Map</div><div class=\"sl-desc\">Every screen detailed</div></div></div></div>", "snapshot": "<h1>Current System Snapshot</h1><p>Counts reflecting the repository state at time of writing.</p><div class=\"stat-grid\"><div class=\"stat-card\"><div class=\"val\">72</div><div class=\"lbl\">Routed paths</div></div><div class=\"stat-card\"><div class=\"val\">65</div><div class=\"lbl\">Feature registry entries</div></div><div class=\"stat-card\"><div class=\"val\">71</div><div class=\"lbl\">Page files</div></div><div class=\"stat-card\"><div class=\"val\">137</div><div class=\"lbl\">Component files</div></div><div class=\"stat-card\"><div class=\"val\">43</div><div class=\"lbl\">Edge functions</div></div><div class=\"stat-card\"><div class=\"val\">23</div><div class=\"lbl\">Database tables</div></div><div class=\"stat-card\"><div class=\"val\">48</div><div class=\"lbl\">UI primitives</div></div><div class=\"stat-card\"><div class=\"val\">11</div><div class=\"lbl\">Hook modules</div></div></div><h2>Feature State Split</h2><div class=\"table-wrap\"><table><tr><th>State</th><th>Count</th><th>Meaning</th></tr><tr><td><span class=\"tag tag-live\">live</span></td><td>32</td><td>Intended for normal operation</td></tr><tr><td><span class=\"tag tag-beta\">beta</span></td><td>13</td><td>Real but staged</td></tr><tr><td><span class=\"tag tag-hidden\">hidden</span></td><td>16</td><td>In code, not broadly surfaced</td></tr><tr><td><span class=\"tag tag-internal\">internal</span></td><td>4</td><td>Reserved for internal/owner use</td></tr></table></div><h2>Category Split</h2><div class=\"table-wrap\"><table><tr><th>Category</th><th>Count</th></tr><tr><td>system</td><td>9</td></tr><tr><td>workspace</td><td>8</td></tr><tr><td>job-search</td><td>10</td></tr><tr><td>career-growth</td><td>8</td></tr><tr><td>outreach</td><td>7</td></tr><tr><td>portfolio</td><td>5</td></tr><tr><td>internal-ops</td><td>4</td></tr><tr><td>interview / salary / support</td><td>3 each</td></tr><tr><td>comparison / account</td><td>2 each</td></tr><tr><td>analysis</td><td>1</td></tr></table></div><div class=\"callout info\">Hidden and beta background features can appear inside the owner-only <strong>Labs</strong> sidebar group when owner bypass is active.</div>", "northstar": "<h1>North-Star Product Model</h1><p>CareerOS is an <strong>operating system for a candidate</strong>.</p><h2>Core Principles</h2><ol><li>Carry <strong>one active resume</strong> through the whole workspace.</li><li>Same resume feeds analysis, builder, tailoring, export, applications, outreach.</li><li>Feature exposure <strong>centrally governed</strong>.</li><li>AI usage <strong>metered through credits</strong>.</li><li>Owner can launch, hide, price, throttle, override, audit <strong>without changing routes</strong>.</li><li>Operational traces via notifications, activity logs, audit logs.</li></ol><h2>Architecture Concepts</h2><ul><li>Persistent <code>AppShell</code></li><li><code>ActiveResumeContext</code> + <code>AnalysisContext</code></li><li>Static + runtime feature catalog</li><li>Per-feature access decisions</li><li>Credit-cost surfaces on nav items</li><li>Edge-function-backed AI modules</li></ul>", "architecture": "<h1>System Architecture</h1><h2>Frontend Stack</h2><p>React 18 + Vite + TypeScript SPA with Tailwind and shadcn/ui.</p><pre>QueryClientProvider → ThemeProvider → AuthProvider → AnalysisProvider\n  → ActiveResumeProvider → BrowserRouter → ProtectedRoute\n    → AppShell → AppSidebar + AppLayout → Route page</pre><h2>Backend (Supabase)</h2><ul><li><strong>Auth</strong> — authentication</li><li><strong>Database</strong> — persistence</li><li><strong>Realtime</strong> — subscriptions</li><li><strong>RPC</strong> — admin/entitlements</li><li><strong>Edge Functions</strong> — AI workflows</li></ul><h2>Cross-Cutting Concepts</h2><div class=\"table-wrap\"><table><tr><th>Concept</th><th>Module</th><th>Description</th></tr><tr><td>Auth</td><td><code>AuthContext</code></td><td>Protected routes and user metadata</td></tr><tr><td>Roles</td><td><code>role-access.ts</code></td><td>owner/admin/support/analyst/user</td></tr><tr><td>Active resume</td><td><code>ActiveResumeContext</code></td><td>Current resume for all tools</td></tr><tr><td>Analysis</td><td><code>AnalysisContext</code></td><td>Latest analysis payload</td></tr><tr><td>Feature registry</td><td><code>feature-registry.ts</code></td><td>Static catalog</td></tr><tr><td>Runtime catalog</td><td><code>runtime-feature-catalog.ts</code></td><td>DB-backed state/pricing</td></tr><tr><td>Credits</td><td><code>useCredits</code></td><td>Metered AI access</td></tr></table></div>", "appshell": "<h1>The Shared App Shell</h1><h2>AppShell</h2><p><code>AppShell.tsx</code> — Wraps all protected pages, owns sidebar state, coordinates mobile/desktop, lazy-loads command palette and onboarding tour.</p><h2>AppLayout</h2><p>Page title, top bar, consistent padding, breadcrumbs, shared footer.</p><h2>AppSidebar</h2><p>Navigation rail: brand lockup, collapse/expand, top-level pills, grouped nav, active resume card, credits badge, utility menu, user identity.</p><h2>ActiveResumeDropdown</h2><p>Current resume title/alias, switch, upload link, inline alias editing, syncs to <code>sessionStorage</code>.</p><h2>CreditsBadge + CommandPalette</h2><p>Credit balance display. Global search/quick navigation shortcut layer.</p>", "navigation": "<h1>Navigation Model</h1><p>Sidebar is a <strong>governed launch surface</strong> from feature registry + runtime catalog.</p><h2>Top-Level</h2><ul><li><code>Dashboard</code> → <code>/dashboard</code></li><li><code>Analysis</code> → <code>/analysis</code></li></ul><h2>Groups</h2><div class=\"table-wrap\"><table><tr><th>Group</th><th>Intent</th></tr><tr><td><strong>Build</strong></td><td>Resume creation, resumes, templates, export</td></tr><tr><td><strong>Optimize</strong></td><td>Analysis-adjacent improvement</td></tr><tr><td><strong>Apply</strong></td><td>Applications and outreach</td></tr><tr><td><strong>Grow</strong></td><td>Interviews and career growth</td></tr><tr><td><strong>Labs</strong></td><td>Owner-only preview for hidden/beta</td></tr></table></div><div class=\"callout\">Labs: assembled when owner bypass is active. Feature must have <code>background</code> surface + <code>beta</code>/<code>hidden</code> state + concrete route.</div>", "resume": "<h1>Resume System &amp; Analysis Sync</h1><h2>Active Resume Model</h2><p>Fetches up to 50 <code>saved_resumes</code> rows. Priority: sessionStorage ID → <code>is_primary</code> → most recently updated. Clears analysis if no resumes.</p><h2>Resume/Analysis Linking</h2><ol><li>By <code>resume_id</code></li><li>By file-name candidates</li><li>Auto-links back when found</li><li>Keeps in-memory analysis if it belongs</li></ol><h2>Resume Source Hook</h2><p><code>useResumeSource.ts</code> — saved resume, session parse, pasted text. Listens for <code>resumes-changed</code>.</p><h2>Analysis Context</h2><p>Stores scores, ATS/parsing/recruiter/content/humanizer/structure/skills analysis, competency mapping, improvement roadmap, reports.</p>", "feature-gov": "<h1>Feature Governance</h1><h2>Static Registry</h2><p>Each feature: <code>featureKey</code>, <code>route</code>, <code>state</code>, <code>category</code>, <code>defaultPlanAccess</code>, <code>launchSurface</code>, <code>navGroup</code>.</p><h2>States</h2><div class=\"table-wrap\"><table><tr><th>State</th><th>Meaning</th></tr><tr><td><span class=\"tag tag-live\">live</span></td><td>Available normally</td></tr><tr><td><span class=\"tag tag-beta\">beta</span></td><td>Real but staged</td></tr><tr><td><span class=\"tag tag-hidden\">hidden</span></td><td>Not generally exposed</td></tr><tr><td><span class=\"tag tag-internal\">internal</span></td><td>Owner access only</td></tr><tr><td><span class=\"tag tag-disabled\">disabled</span></td><td>Route exists but blocked</td></tr></table></div><h2>Surfaces</h2><p><strong>primary</strong> (core) · <strong>secondary</strong> (important) · <strong>background</strong> (unsurfaced) · <strong>system</strong> (auth/shell).</p><h2>Runtime Catalog</h2><p>Via <code>get_feature_surface_catalog</code>. Falls back to static registry if RPC missing.</p><h2>Route Gating</h2><p><code>FeatureRouteGate</code>: blocks hidden/disabled, shows fallback, caches 60s.</p><h2>Owner Bypass</h2><p>Hidden/internal in nav, Labs group, broadened access.</p><h2>Roles</h2><p><code>owner</code> → <code>admin</code> → <code>support</code> → <code>analyst</code> → <code>user</code></p><div class=\"callout warn\">Frontend management is owner-only. Backend defines broader taxonomy.</div>", "credits": "<h1>Credits &amp; Billing</h1><h2>Truth Layers</h2><ol><li>Backend fallback (<code>access-control.ts</code>)</li><li>Frontend fallback (<code>useCredits.ts</code>)</li><li>Runtime (<code>features.credit_cost</code>)</li></ol><h2>Cost Bands</h2><h3>Heavy — 3cr</h3><p><code>analysis</code> · <code>upload</code> · <code>jd_tailor</code> · <code>job_match</code> · <code>jobs_for_you</code> · <code>mock_interview</code> · <code>interview_prep</code> · <code>smart_recommendations</code> · <code>market_digest</code> · <code>job_alerts</code></p><h3>Medium — 2cr</h3><p><code>cover_letter</code> · <code>linkedin_optimizer</code> · <code>star_builder</code> · <code>salary_benchmark</code> · <code>salary_negotiation</code> · <code>offer_comparison</code> · <code>company_research</code> · <code>career_intelligence</code> · <code>career_path</code> · <code>skill_gap</code> · <code>learning_roadmap</code> · <code>personal_branding</code> · <code>case_study</code> · <code>referral_mapper</code> · <code>rewrites</code> · <code>export_center</code></p><h3>Light — 1cr</h3><p><code>bio_generator</code> · <code>elevator_pitch</code> · <code>thank_you_note</code> · <code>follow_up_email</code> · <code>reference_letter</code> · <code>cold_email</code></p><h3>Exempt</h3><p><code>builder</code> · <code>my_resumes</code> · <code>designer_templates</code> · <code>publish</code></p><h2>Deduction Flow</h2><div class=\"flow-box\"><div class=\"flow-steps\"><div class=\"flow-step\">Open feature</div><div class=\"flow-arrow\">→</div><div class=\"flow-step\">Gate</div><div class=\"flow-arrow\">→</div><div class=\"flow-step\">Access RPC</div><div class=\"flow-arrow\">→</div><div class=\"flow-step\">Edge fn</div><div class=\"flow-arrow\">→</div><div class=\"flow-step\">AI work</div><div class=\"flow-arrow\">→</div><div class=\"flow-step\">Deduct</div></div></div><div class=\"callout\">Access checked <strong>before</strong> work. Deduction <strong>after</strong> success.</div>", "admin": "<h1>Admin Panel</h1><p><code>/features</code> · <span class=\"tag tag-internal\">internal</span></p><h2>Tabs</h2><div class=\"table-wrap\"><table><tr><th>Tab</th><th>Purpose</th></tr><tr><td><strong>Feature Registry</strong></td><td>State, visibility, billing, credit cost, rollout, plans</td></tr><tr><td><strong>User Access</strong></td><td>Search, overrides, plan assignment, beta, top-ups</td></tr><tr><td><strong>Plan Entitlements</strong></td><td>Feature-by-plan inclusion and limits</td></tr><tr><td><strong>Kill Switches</strong></td><td>Emergency shutdown</td></tr><tr><td><strong>Audit Log</strong></td><td>All changes with old/new JSON</td></tr><tr><td><strong>Database</strong></td><td>Browse-only data viewer</td></tr></table></div><h2>Sync Catalog</h2><p>Pushes static registry → DB via <code>upsert_feature_catalog</code>.</p><h2>Kill Switches</h2><p><code>export_center</code> · <code>analysis</code> · <code>jd_tailor</code> · <code>mock_interview</code> · <code>publish</code></p><div class=\"callout info\">Route map stays stable. Governance via visibility, catalog, flags, entitlements, overrides.</div>", "notifications": "<h1>Notifications &amp; Activity</h1><h2>Helpers</h2><p><code>createNotification()</code> · <code>logActivity()</code> · <code>trackUserEvent()</code></p><h2>Notifications Page</h2><p>Unread/all filter, badge count, mark read, delete, clear all. Groups by date. Realtime subscriptions.</p><h2>Activity Page</h2><p>Admin Audit Log + My Activity. Grouped dates, per-action icons, entity filtering.</p><h2>Action Types</h2><p><code>resume_created/updated/deleted/analyzed/exported</code> · <code>job_saved/applied</code> · <code>cover_letter_generated</code> · <code>interview_completed</code> · <code>portfolio_created</code> · <code>login/signup</code></p>", "runbooks": "<h1>Operations Runbooks</h1><h2>New Feature Launch</h2><ol><li>Add metadata to registry</li><li>Wire route + <code>FeatureRouteGate</code></li><li>Add sidebar discoverability</li><li>Add plan defaults</li><li>Set state/rollout in admin</li><li>Add optional kill switch</li><li>Add activity/notification emission</li><li>Update features.md</li></ol><h2>Feature Pause</h2><ol><li>Toggle kill switch</li><li>Or set state to <code>disabled</code></li><li>Verify gate message</li><li>Confirm catalog event</li><li>Record reason in audit</li></ol><h2>User Exception</h2><ol><li>Search user in Admin</li><li>Apply override with reason/expiry</li><li>Top up credits if needed</li><li>Remove after closure</li></ol>", "database": "<h1>Database Surface</h1><p>23 public tables.</p><h2>Resume &amp; Analysis</h2><p><code>saved_resumes</code> · <code>resume_analyses</code> · <code>resume_analysis_runs</code> · <code>resume_extractions</code> · <code>recruiter_favorites</code></p><h2>Job Search</h2><p><code>saved_jobs</code> · <code>job_applications</code> · <code>job_alerts</code> · <code>job_alert_results</code> · <code>jd_tailor_history</code></p><h2>Portfolio/Interview</h2><p><code>portfolios</code> · <code>mock_interview_sessions</code></p><h2>Notifications</h2><p><code>notifications</code> · <code>activity_logs</code> · <code>admin_audit_logs</code></p><h2>Account</h2><p><code>profiles</code> · <code>app_settings</code> · <code>user_credits</code> · <code>user_feature_overrides</code></p><h2>Governance</h2><p><code>features</code> · <code>feature_flags</code> · <code>plans</code> · <code>plan_entitlements</code></p>", "edge-functions": "<h1>Edge Functions</h1><p>43 entrypoints.</p><h2>Resume</h2><p><code>analyze-resume</code> · <code>parse-resume</code> · <code>apply-analysis-fixes</code> · <code>rewrite-bullets</code> · <code>humanize-text</code> · <code>generate-from-text</code> · <code>generate-alias</code></p><h2>Export</h2><p><code>generate-docx</code> · <code>generate-latex</code></p><h2>Job Search</h2><p><code>extract-job-description</code> · <code>jd-gap-analysis</code> · <code>find-jobs</code> · <code>scrape-jobs</code> · <code>process-job-alerts</code> · <code>job-match</code> · <code>company-research</code> · <code>market-digest</code> · <code>smart-recommendations</code></p><h2>Outreach</h2><p><code>generate-cover-letter</code> · <code>generate-follow-up-email</code> · <code>linkedin-optimizer</code> · <code>cold-email-ab</code> · <code>reference-letter</code> · <code>referral-mapper</code> · <code>elevator-pitch</code> · <code>bio-generator</code> · <code>personal-branding</code></p><h2>Career</h2><p><code>interview-prep</code> · <code>mock-interview</code> · <code>evaluate-answer</code> · <code>star-builder</code> · <code>career-intelligence</code> · <code>career-path-visualizer</code> · <code>learning-roadmap</code> · <code>skill-gap-heatmap</code> · <code>salary-benchmark</code> · <code>salary-negotiation</code> · <code>compare-offers</code> · <code>case-study-builder</code></p>", "state-registry": "<h1>State &amp; Events</h1><h2>Session Storage</h2><p><code>activeResumeId</code> · <code>parsed_resume_data</code> · <code>sgnk_active_analysis</code> · <code>__sgnk_auth_next__</code></p><h2>Local Storage</h2><p><code>theme</code> · <code>sgnk_feature_catalog_version</code> · <code>sgnk-sidebar-open/width</code> · <code>sgnk_recent_pages</code> · <code>sgnk_jd_tailor:*</code></p><h2>Custom Events</h2><p><code>resumes-changed</code> · <code>sgnk-feature-catalog-changed</code> · <code>sgnk-open-command</code></p><h2>Realtime Channels</h2><div class=\"table-wrap\"><table><tr><th>Channel</th><th>Table</th><th>Events</th></tr><tr><td><code>notifications-inbox-{userId}</code></td><td>notifications</td><td>* (badge)</td></tr><tr><td><code>notifications-realtime</code></td><td>notifications</td><td>INSERT</td></tr><tr><td><code>activity-realtime</code></td><td>activity_logs</td><td>INSERT</td></tr></table></div>", "screen-map": "<h1>Screen-by-Screen Map</h1><h2>Dashboard</h2><p><code>/dashboard</code> · <span class=\"tag tag-live\">live</span> · Hero card, workflow rail, analysis snapshot, priority actions.</p><h2>Upload</h2><p><code>/upload</code> · <span class=\"tag tag-live\">live</span> · <strong>3cr</strong> · PDF/DOCX/TXT (10MB). PDF via pdfjs-dist.</p><h2>My Resumes</h2><p><code>/my-resumes</code> · <span class=\"tag tag-live\">live</span> · <strong>0cr</strong> · Manage versions, search, duplicate, AI alias, delete cascade, share.</p><h2>Builder</h2><p><code>/builder</code> · <span class=\"tag tag-live\">live</span> · <strong>0cr</strong> · Edit/preview/split. 12+ sections, drag-drop, AI gen, templates, live scoring.</p><h2>Templates</h2><p><code>/templates</code> · <span class=\"tag tag-live\">live</span> · ATS, modern, executive, consulting, technical, design, LaTeX, startup, creative, compact, two-page.</p><h2>Export Center</h2><p><code>/export</code> · <span class=\"tag tag-live\">live</span> · <strong>2cr</strong> · ATS-Safe PDF, DOCX, LaTeX, Design Premium.</p><h2>Analysis</h2><p><code>/analysis</code> · <span class=\"tag tag-live\">live</span> · <strong>3cr</strong> · 10 tabs: Overview, Recommendations, ATS, Parsing, Recruiter, Content, Structure, AI Detection, Roadmap, Report.</p><h2>JD Tailor</h2><p><code>/jd-tailor</code> · <span class=\"tag tag-live\">live</span> · Match score, keywords, suggestions. History persisted.</p><h2>App Tracker</h2><p><code>/application-tracker</code> · <span class=\"tag tag-live\">live</span> · Kanban pipeline.</p><h2>More</h2><p>LinkedIn Optimizer, Compare Versions/Analytics, Notifications, Settings, Profile Hub, Help, Install (PWA).</p>", "module-catalog": "<h1>Module Catalog</h1><h2>Job Search</h2><p>Jobs For You, Job Alerts, Job Match, Smart Recs — <span class=\"tag tag-beta\">beta</span><br>Company Research, Market Digest — <span class=\"tag tag-hidden\">hidden</span></p><h2>Outreach</h2><p>Cover Letter, Follow-Up, Thank You — <span class=\"tag tag-live\">live</span><br>Cold Email, Reference Letter, Referral Mapper, Elevator Pitch — <span class=\"tag tag-hidden\">hidden</span></p><h2>Interview</h2><p>Interview Prep, Mock Interview, STAR Builder — <span class=\"tag tag-beta\">beta</span></p><h2>Portfolio</h2><p>Portfolios, Builder, Templates, Editor, Publish — <span class=\"tag tag-beta\">beta</span></p><h2>Career Growth</h2><p>Career Intelligence/Path, Skill Gap, Learning Roadmap, Personal Branding, Bio Generator, Case Study — <span class=\"tag tag-hidden\">hidden</span></p><h2>Salary</h2><p>Benchmark, Negotiation, Offer Comparison — <span class=\"tag tag-hidden\">hidden</span></p><h2>Internal</h2><p>Controls, Analytics, Activity, HR Hub — <span class=\"tag tag-internal\">internal</span></p>", "components": "<h1>Component Map</h1><h2>Shell</h2><p><code>AppShell</code> · <code>AppLayout</code> · <code>AppSidebar</code> · <code>ActiveResumeDropdown</code> · <code>CommandPalette</code> · <code>OnboardingTour</code> · <code>PageLoader</code> · <code>ThemeToggle</code></p><h2>Analysis</h2><p><code>ScoreCard</code> · <code>ScoreRing</code> · <code>OverviewContent</code> · <code>ATSContent</code> · <code>ParsingContent</code> · <code>RecruiterContent</code> · <code>ContentContent</code> · <code>StructureContent</code></p><h2>Builder</h2><p><code>ResumeForm</code> · <code>ResumePreview</code> · <code>LiveScoring</code> · <code>ResumeReadinessPanel</code> · <code>GenerateFromTextDialog</code> · <code>TemplatePickerDialog</code></p><h2>Admin</h2><p><code>AdminFeatureRegistryTab</code> · <code>AdminPlanEntitlementsTab</code> · <code>AdminUserAccessTab</code> · <code>AdminKillSwitchesTab</code> · <code>AdminAuditLogTable</code> · <code>AdminDatabaseExplorer</code></p>", "routes": "<h1>Route Inventory</h1><h2>Analysis Aliases</h2><div class=\"table-wrap\"><table><tr><th>Alias</th><th>Target</th></tr><tr><td><code>/ats</code></td><td><code>?tab=ats</code></td></tr><tr><td><code>/parsing</code></td><td><code>?tab=parsing</code></td></tr><tr><td><code>/recruiter</code></td><td><code>?tab=recruiter</code></td></tr><tr><td><code>/content</code></td><td><code>?tab=content</code></td></tr><tr><td><code>/humanizer</code></td><td><code>?tab=ai</code></td></tr><tr><td><code>/structure</code></td><td><code>?tab=structure</code></td></tr><tr><td><code>/reports</code></td><td><code>?tab=report</code></td></tr><tr><td><code>/recommendations</code></td><td><code>?tab=recommendations</code></td></tr><tr><td><code>/improvement-roadmap</code></td><td><code>?tab=roadmap</code></td></tr></table></div><h2>Core</h2><p><code>/dashboard</code> · <code>/upload</code> · <code>/analysis</code> · <code>/my-resumes</code> · <code>/builder</code> · <code>/templates</code> · <code>/export</code></p><h2>38+ Feature Routes</h2><p>JD Tailor, Rewrites, Job Match, Jobs For You, Alerts, Tracker, Cover Letter, Follow-Up, LinkedIn, Interview Prep, Mock, STAR, Salary tools, Career tools, Outreach, and more.</p><h2>System</h2><p><code>/features</code> · <code>/activity</code> · <code>/notifications</code> · <code>/settings</code> · <code>/install</code> · <code>/help</code></p>", "registry-appendix": "<h1>Feature Registry</h1><h2>32 Live</h2><p>Dashboard, Upload, Analysis, My Resumes, Builder, Templates, Export, JD Tailor, App Tracker, LinkedIn, Compare, Cover Letter, Follow-Up, Thank You, Rewrites, Notifications, Settings, Profile Hub, Help, Install + system features.</p><h2>13 Beta</h2><p>Jobs For You, Job Alerts, Job Match, Smart Recs, Job Roadmap, Interview Prep, Mock Interview, STAR Builder, Portfolios (5).</p><h2>16 Hidden</h2><p>Company Research, Market Digest, Salary (3), Career Growth (7), Outreach hidden (4).</p><h2>4 Internal</h2><p>HR Hub, Analytics, Activity, Features Catalog.</p>", "resume-data": "<h1>Resume Data Model</h1><p><code>ResumeData</code> in <code>saved_resumes.resume_data</code>.</p><h2>Blocks</h2><p><code>contact</code> · <code>summary</code> · <code>experience[]</code> · <code>education[]</code> · <code>skills[]</code> · <code>projects[]</code> · <code>certifications[]</code> · <code>awards[]</code> · <code>languages[]</code> · <code>volunteer[]</code> · <code>publications[]</code> · <code>customSections[]</code></p><h2>Contact</h2><p>name, title, email, phone, location, linkedin, portfolio, photo.</p><h2>Experience</h2><p>title, company, location, dates, current, url, bullets[].</p><h2>Custom Sections</h2><p>Arbitrary title, text, structured items. Extensible.</p><h2>Integrity</h2><ul><li>Add fields additively</li><li>Keep unknown-field tolerance</li><li>Don't rename existing keys</li></ul>", "export": "<h1>Export Architecture</h1><h2>Two Modes</h2><p><strong>Text-first</strong> (jsPDF) + <strong>visual fallback</strong> (raster).</p><h2>Presets</h2><ul><li>ATS-Safe PDF</li><li>DOCX via <code>generate-docx</code> + JSZip</li><li>LaTeX via <code>generate-latex</code></li><li>Design Premium PDF</li></ul><h2>Why Text-First</h2><p>Selectable, searchable text — essential for ATS.</p><h2>Pagination</h2><p>Overflow detection + <code>waitForResumePages</code> readiness checks.</p>", "workflows": "<h1>E2E Workflows</h1><h2>Candidate Flow</h2><div class=\"flow-box\"><div class=\"flow-steps\"><div class=\"flow-step\">Sign in</div><div class=\"flow-arrow\">→</div><div class=\"flow-step\">Upload</div><div class=\"flow-arrow\">→</div><div class=\"flow-step\">Analyze</div><div class=\"flow-arrow\">→</div><div class=\"flow-step\">Edit</div><div class=\"flow-arrow\">→</div><div class=\"flow-step\">Tailor</div><div class=\"flow-arrow\">→</div><div class=\"flow-step\">Export</div><div class=\"flow-arrow\">→</div><div class=\"flow-step\">Track</div></div></div><h2>Feature Launch</h2><ol><li>Add registry entry + route</li><li>Sync catalog</li><li>Set state/rollout/billing</li><li>Add entitlements</li><li>Monitor via audit</li></ol><h2>Takeaways</h2><div class=\"callout\"><ol><li>Unified workspace, not isolated tools.</li><li>Active resume is the backbone.</li><li>Registry + catalog governs launches.</li><li>Credits integrated everywhere.</li><li>Internal controls is a real console.</li><li>Registry state discipline matters.</li></ol></div>", "troubleshooting": "<h1>Troubleshooting</h1><h2>Upload</h2><div class=\"table-wrap\"><table><tr><th>Symptom</th><th>Fix</th></tr><tr><td>Analysis too long</td><td>Retry compacted text</td></tr><tr><td>DOCX fails</td><td>Re-export as PDF</td></tr><tr><td>Wrong resume</td><td>Reset active, refresh context</td></tr></table></div><h2>Analysis</h2><div class=\"table-wrap\"><table><tr><th>Symptom</th><th>Fix</th></tr><tr><td>Empty after upload</td><td>Reload + file_name fallback</td></tr><tr><td>Stale after delete</td><td>Clear analysis context</td></tr></table></div><h2>Debug Matrix</h2><div class=\"table-wrap\"><table><tr><th>Symptom</th><th>Resolution</th></tr><tr><td>Analysis empty</td><td>Linking fallback + refresh</td></tr><tr><td>Wrong builder resume</td><td>Reset session key</td></tr><tr><td>Admin change missing</td><td>broadcastFeatureCatalogChange</td></tr><tr><td>Badge stale</td><td>Reconnect channel</td></tr></table></div>", "qa": "<h1>QA Matrix</h1><h2>Build</h2><ol><li>Upload PDF → analysis → builder enriched</li><li>DOCX → extraction works</li><li>Save → My Resumes</li><li>Export succeeds</li><li>Error → fallback completes</li></ol><h2>Admin</h2><ol><li>State change → sidebar</li><li>Plan toggle → access</li><li>Override → independent</li><li>Kill switch → pause</li><li>Audit captures all</li></ol>", "maintainer": "<h1>Maintainer Guide</h1><h2>Key Files</h2><p><code>App.tsx</code> · <code>AppShell.tsx</code> · <code>AppSidebar.tsx</code> · <code>feature-registry.ts</code> · <code>runtime-feature-catalog.ts</code> · <code>feature-access.ts</code> · <code>FeatureRouteGate.tsx</code> · <code>useCredits.ts</code> · <code>ActiveResumeContext.tsx</code> · <code>AnalysisContext.tsx</code> · <code>Upload.tsx</code> · <code>ResumeBuilder.tsx</code> · <code>resume-export.ts</code></p><h2>When to Update</h2><ul><li>New route</li><li>Registry change</li><li>Credit pricing change</li><li>Admin RPC change</li><li>New table</li><li>Flow change</li></ul><h2>Quarterly Audit</h2><ol><li>Routes vs App.tsx</li><li>Registry vs runtime snapshot</li><li>Schema vs Supabase types</li><li>Incidents vs runbooks</li></ol>"};

// Theme
function getTheme(){return localStorage.getItem('cos-theme')||'dark'}
function setTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('cos-theme',t);document.getElementById('themeKnob').textContent=t==='dark'?'\u{1F319}':'\u2600\uFE0F';}
setTheme(getTheme());
document.getElementById('themeToggle').addEventListener('click',function(){setTheme(getTheme()==='dark'?'light':'dark');});
document.getElementById('themeToggle').addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();setTheme(getTheme()==='dark'?'light':'dark');}});
// Sidebar
function openSb(){document.getElementById('sidebar').classList.add('open');document.getElementById('overlay').classList.add('open');}
function closeSb(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('open');}
document.getElementById('menuBtn').addEventListener('click',function(){document.getElementById('sidebar').classList.contains('open')?closeSb():openSb();});
document.getElementById('overlay').addEventListener('click',closeSb);
// Nav
var NAV=[
{group:"Overview",items:[{id:"overview",icon:"\u{1F3E0}",label:"Product Overview"},{id:"snapshot",icon:"\u{1F4CA}",label:"System Snapshot"},{id:"northstar",icon:"\u2B50",label:"North-Star Model"}]},
{group:"Architecture",items:[{id:"architecture",icon:"\u{1F3D7}",label:"System Architecture"},{id:"appshell",icon:"\u{1F5A5}",label:"App Shell"},{id:"navigation",icon:"\u{1F9ED}",label:"Navigation Model"}]},
{group:"Core Systems",items:[{id:"resume",icon:"\u{1F4C4}",label:"Resume System"},{id:"feature-gov",icon:"\u{1F39B}",label:"Feature Governance"},{id:"credits",icon:"\u{1F4B3}",label:"Credits & Billing"}]},
{group:"Admin & Ops",items:[{id:"admin",icon:"\u2699\uFE0F",label:"Admin Panel"},{id:"notifications",icon:"\u{1F514}",label:"Notifications"},{id:"runbooks",icon:"\u{1F4CB}",label:"Runbooks"}]},
{group:"Data Layer",items:[{id:"database",icon:"\u{1F5C4}",label:"Database"},{id:"edge-functions",icon:"\u26A1",label:"Edge Functions"},{id:"state-registry",icon:"\u{1F517}",label:"State & Events"}]},
{group:"Feature Map",items:[{id:"screen-map",icon:"\u{1F4F1}",label:"Screen Map"},{id:"module-catalog",icon:"\u{1F4E6}",label:"Module Catalog"},{id:"components",icon:"\u{1F9E9}",label:"Components"}]},
{group:"Reference",items:[{id:"routes",icon:"\u{1F6E4}",label:"Routes"},{id:"registry-appendix",icon:"\u{1F4D1}",label:"Feature Registry"},{id:"resume-data",icon:"\u{1F4DD}",label:"Resume Data Model"},{id:"export",icon:"\u{1F4E4}",label:"Export Architecture"}]},
{group:"Operations",items:[{id:"workflows",icon:"\u{1F504}",label:"E2E Workflows"},{id:"troubleshooting",icon:"\u{1F527}",label:"Troubleshooting"},{id:"qa",icon:"\u2705",label:"QA Matrix"},{id:"maintainer",icon:"\u{1F4D6}",label:"Maintainer Guide"}]}
];
var currentPage='overview';
function buildNav(){var nav=document.getElementById('nav'),h='';for(var g=0;g<NAV.length;g++){var gr=NAV[g];h+='<div class="nav-group"><div class="nav-group-label">'+gr.group+'</div>';for(var i=0;i<gr.items.length;i++){var it=gr.items[i];h+='<div class="nav-item'+(it.id===currentPage?' active':'')+'" data-id="'+it.id+'" tabindex="0"><span class="icon">'+it.icon+'</span><span class="label">'+it.label+'</span></div>';}h+='</div>';}nav.innerHTML=h;nav.querySelectorAll('.nav-item').forEach(function(el){el.addEventListener('click',function(){navigateTo(el.dataset.id);});el.addEventListener('keydown',function(e){if(e.key==='Enter')navigateTo(el.dataset.id);});});}
function navigateTo(id){if(!PAGES[id])return;currentPage=id;document.getElementById('page-content').innerHTML=PAGES[id];document.getElementById('content-area').scrollTop=0;document.querySelectorAll('.nav-item').forEach(function(el){el.classList.toggle('active',el.dataset.id===id);});var l=document.querySelector('.nav-item[data-id="'+id+'"] .label');document.getElementById('breadcrumb-page').textContent=l?l.textContent:id;closeSb();history.pushState(null,null,'#'+id);}
document.getElementById('search').addEventListener('input',function(){var q=this.value.toLowerCase();document.querySelectorAll('.nav-group').forEach(function(g){var any=false;g.querySelectorAll('.nav-item').forEach(function(i){var m=i.textContent.toLowerCase().indexOf(q)!==-1;i.style.display=m?'':'none';if(m)any=true;});g.style.display=any?'':'none';});});
buildNav();var initHash=location.hash.slice(1);navigateTo(initHash&&PAGES[initHash]?initHash:'overview');
window.addEventListener('popstate',function(){var h=location.hash.slice(1);if(h&&PAGES[h])navigateTo(h);});
document.addEventListener('keydown',function(e){if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();document.getElementById('search').focus();}});
</script>
